name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway deploy
        run: |
          if [ -z "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}" ]; then
            echo "RAILWAY_DEPLOY_WEBHOOK secret is not set, skipping deployment."
          else
            curl -X POST "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d '{"branch": "main"}'
          fi

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Vercel deploy
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_WEBHOOK }}" ]; then
            echo "VERCEL_DEPLOY_WEBHOOK secret is not set, skipping deployment."
          else
            curl -X POST "${{ secrets.VERCEL_DEPLOY_WEBHOOK }}"
          fi
