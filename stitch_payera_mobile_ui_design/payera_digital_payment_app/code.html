<!-- Interactive script for ambient glow following mouse movement -->
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('ambient-glow');
            const x = (e.clientX / window.innerWidth) * 50 - 25;
            const y = (e.clientY / window.innerHeight) * 50 - 25;
            
            const firstCircle = glow.children[0];
            const secondCircle = glow.children[1];
            
            firstCircle.style.transform = `translate(${x}px, ${y}px)`;
            secondCircle.style.transform = `translate(${-x}px, ${-y}px)`;
        });

        // Simulating the "Connect" interaction
        const connectBtn = document.querySelector('button');
        connectBtn.addEventListener('click', () => {
            // Visual feedback for interaction
            connectBtn.innerHTML = `
                <span class="flex items-center gap-md">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Authorizing...
                </span>
            `;
            
            // In a real app, this would trigger the Freighter browser extension
            setTimeout(() => {
                alert("Freighter Connection Requested. Check your extension window.");
                location.reload(); // Reset for demo
            }, 1500);
        });
    </script>
